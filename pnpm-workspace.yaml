packages:
  - 'package'

allowBuilds:
  esbuild: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

overrides:
  chokidar: '>=5'
  eslint-import-resolver-typescript: '^4.4.5'
  semver: '>=7'
  vite@<=6.4.1: '>=6.4.2'
  vite@>=6.0.0 <=6.4.1: '>=6.4.2'
  vite@>=7.0.0 <=7.3.1: '>=7.3.2'
  vite@>=7.1.0 <=7.3.1: '>=7.3.2'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'

trustPolicy: no-downgrade
